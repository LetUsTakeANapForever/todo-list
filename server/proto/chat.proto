syntax = "proto3";

option go_package = "/proto/gen";

service Chat {
    rpc Chat (stream ChatRequest) returns (stream ChatResponse);
    // Lobby is a server-streaming RPC that emits lobby-level events (room list updates, user join/leave summaries, system notifications)
    rpc Lobby (SubscribeLobbyRequest) returns (stream LobbyResponse);
    rpc CreateRoom (CreateRoomRequest) returns (RoomResponse);
    rpc JoinRoom (JoinRoomRequest) returns (RoomResponse);
    rpc LeaveRoom (LeaveRoomRequest) returns (RoomResponse);
    rpc ListRooms (ListRoomsRequest) returns (ListRoomsResponse);
}

// ============= Server → Client =============
message ChatResponse {
    oneof event {
        NewMessageEvent newMessage = 1;
        UserTypingEvent userTyping = 2;
        SystemNotification systemNotification = 3;
    }
}
message NewMessageEvent {
    string messageId = 1;
    string roomId = 2;
    string senderId = 3;
    string text = 4;
    string timestamp = 5;
}

message UserTypingEvent {
    string roomId = 1;
    string userId = 2;
    bool isTyping = 3;
}

message SystemNotification {
    string type = 1;
    string message = 2;
    string timestamp = 3;
}


// ============= Client → Server =============
message ChatRequest {
    string userId = 1;
    oneof payload {
        SendMessageRequest sendMessage = 2;
        TypingRequest typingStatus = 3;
    }
}

message SendMessageRequest {
    string roomId = 1;
    string text = 2;
}

message TypingRequest {
    string roomId = 1;
    bool isTyping = 2;
}

message CreateRoomRequest {
    string roomId = 1;
    string userId = 2;
}

message JoinRoomRequest {
    string roomId = 1;
    string userId = 2;
}

message LeaveRoomRequest {
    string roomId = 1;
    string userId = 2;
}

message ListRoomsRequest {}

message RoomResponse {
    string roomId = 1;
    bool created = 2;
    bool joined = 3;
    bool left = 4;
    string message = 5;
}

message ListRoomsResponse {
    repeated string roomIds = 1;
}

// Lobby subscription and events
message SubscribeLobbyRequest {
    string userId = 1;
}

message LobbyResponse {
    oneof event {
        RoomList roomList = 1;
        LobbyUserEvent userEvent = 2;
        SystemNotification systemNotification = 3;
    }
}

message RoomList {
    repeated string roomIds = 1;
}

message LobbyUserEvent {
    string userId = 1;
    string roomId = 2;
    string action = 3; // "joined" or "left"
}
