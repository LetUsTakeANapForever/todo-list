<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
        <h1 class="text-2xl font-semibold mb-6 text-center">
            Sign in to your account
        </h1>
        <form id="loginForm" method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email
                </label>
                <input name="email" type="email" required
                    class="mt-1 block w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input name="password" type="password" class="mt-1 block w-full px-3 py-2 border rounded-md focus:outline-none
                focus:ring-2
                focus:ring-indigo-500" />
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center text-sm">
                    <input type="checkbox" name="remember" class="mr-2" />
                    <span>Remember me</span>
                </label>
                <a href="/forgot" class="text-sm text-blue-600 hover:underline">Forgot?</a>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700">Sign
                in</button>
        </form>
        <div class="mt-4 text-center text-sm text-gray-600">Don't have an account?<a href="/signup"
                class="text-indigo-600 hover:underline">Sign up</a>
        </div>
    </div>
</body>

</html>
